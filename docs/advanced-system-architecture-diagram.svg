<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1080" viewBox="0 0 1800 1080">
  <defs>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #13293d; }
      .subtitle { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #1f3b4d; }
      .layerTitle { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #0f2a3d; }
      .label { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #123; }
      .small { font: 500 12px 'Segoe UI', Arial, sans-serif; fill: #244; }
      .box { rx: 14; ry: 14; stroke-width: 2; }
      .arrow { stroke: #355c7d; stroke-width: 2.4; fill: none; marker-end: url(#arrowHead); }
    </style>
    <marker id="arrowHead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#355c7d"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#eef6fb"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1800" height="1080" fill="url(#bg)"/>

  <text x="900" y="58" class="title" text-anchor="middle">Nexus-Agent Advanced System Architecture</text>
  <text x="900" y="86" class="subtitle" text-anchor="middle">Task-Oriented Multi-Agent Platform for Safe Engineering Automation</text>

  <!-- Layer frames -->
  <rect x="70" y="120" width="1660" height="120" class="box" fill="#fff5e9" stroke="#f0ad4e"/>
  <text x="96" y="146" class="layerTitle">Experience Layer</text>

  <rect x="70" y="260" width="1660" height="120" class="box" fill="#e9f7ff" stroke="#5bc0de"/>
  <text x="96" y="286" class="layerTitle">Service Layer</text>

  <rect x="70" y="400" width="1660" height="170" class="box" fill="#eef7ea" stroke="#8bc34a"/>
  <text x="96" y="426" class="layerTitle">Orchestration Layer</text>

  <rect x="70" y="590" width="1660" height="220" class="box" fill="#f4eefb" stroke="#9c7ed9"/>
  <text x="96" y="616" class="layerTitle">Intelligence, Execution, and Data Layer</text>

  <rect x="70" y="830" width="1660" height="180" class="box" fill="#f3f6fa" stroke="#90a4ae"/>
  <text x="96" y="856" class="layerTitle">External Dependencies and Operations</text>

  <!-- Experience nodes -->
  <rect x="180" y="165" width="320" height="54" class="box" fill="#ffffff" stroke="#f0ad4e"/>
  <text x="340" y="198" class="label" text-anchor="middle">Developers</text>

  <rect x="560" y="165" width="320" height="54" class="box" fill="#ffffff" stroke="#f0ad4e"/>
  <text x="720" y="198" class="label" text-anchor="middle">Automation Pipelines</text>

  <rect x="940" y="165" width="320" height="54" class="box" fill="#ffffff" stroke="#f0ad4e"/>
  <text x="1100" y="198" class="label" text-anchor="middle">API Clients</text>

  <rect x="1320" y="165" width="320" height="54" class="box" fill="#ffffff" stroke="#f0ad4e"/>
  <text x="1480" y="198" class="label" text-anchor="middle">Platform Integrations</text>

  <!-- Service nodes -->
  <rect x="340" y="300" width="500" height="58" class="box" fill="#ffffff" stroke="#5bc0de"/>
  <text x="590" y="335" class="label" text-anchor="middle">FastAPI Entrypoint (health, ready, info, root)</text>

  <rect x="940" y="300" width="520" height="58" class="box" fill="#ffffff" stroke="#5bc0de"/>
  <text x="1200" y="335" class="label" text-anchor="middle">Domain Endpoints (kg/*, skills/*)</text>

  <!-- Orchestration nodes -->
  <rect x="160" y="450" width="280" height="70" class="box" fill="#ffffff" stroke="#8bc34a"/>
  <text x="300" y="492" class="label" text-anchor="middle">Planner Agent</text>

  <rect x="500" y="450" width="280" height="70" class="box" fill="#ffffff" stroke="#8bc34a"/>
  <text x="640" y="492" class="label" text-anchor="middle">Executor Agent</text>

  <rect x="840" y="450" width="280" height="70" class="box" fill="#ffffff" stroke="#8bc34a"/>
  <text x="980" y="492" class="label" text-anchor="middle">Validator Agent</text>

  <rect x="1180" y="450" width="280" height="70" class="box" fill="#ffffff" stroke="#8bc34a"/>
  <text x="1320" y="492" class="label" text-anchor="middle">Learner Agent</text>

  <rect x="1520" y="450" width="170" height="70" class="box" fill="#ffffff" stroke="#8bc34a"/>
  <text x="1605" y="492" class="label" text-anchor="middle">Orchestrator</text>

  <!-- Intelligence/Execution/Data nodes -->
  <rect x="130" y="650" width="360" height="64" class="box" fill="#ffffff" stroke="#9c7ed9"/>
  <text x="310" y="688" class="label" text-anchor="middle">Knowledge Graph Engine</text>

  <rect x="530" y="650" width="360" height="64" class="box" fill="#ffffff" stroke="#9c7ed9"/>
  <text x="710" y="688" class="label" text-anchor="middle">Skill Vault</text>

  <rect x="930" y="650" width="360" height="64" class="box" fill="#ffffff" stroke="#9c7ed9"/>
  <text x="1110" y="688" class="label" text-anchor="middle">Tool Registry and System Tools</text>

  <rect x="1330" y="650" width="360" height="64" class="box" fill="#ffffff" stroke="#9c7ed9"/>
  <text x="1510" y="688" class="label" text-anchor="middle">Sandbox and Workspace Actions</text>

  <rect x="130" y="735" width="360" height="52" class="box" fill="#fcfdff" stroke="#9c7ed9"/>
  <text x="310" y="767" class="small" text-anchor="middle">Graph Cache (memory)</text>

  <rect x="530" y="735" width="360" height="52" class="box" fill="#fcfdff" stroke="#9c7ed9"/>
  <text x="710" y="767" class="small" text-anchor="middle">Skill Vault SQLite</text>

  <rect x="930" y="735" width="360" height="52" class="box" fill="#fcfdff" stroke="#9c7ed9"/>
  <text x="1110" y="767" class="small" text-anchor="middle">Procedural Memory SQLite</text>

  <rect x="1330" y="735" width="360" height="52" class="box" fill="#fcfdff" stroke="#9c7ed9"/>
  <text x="1510" y="767" class="small" text-anchor="middle">Repository File System</text>

  <!-- External and ops nodes -->
  <rect x="130" y="885" width="360" height="64" class="box" fill="#ffffff" stroke="#90a4ae"/>
  <text x="310" y="923" class="label" text-anchor="middle">GitHub Skill Repositories</text>

  <rect x="530" y="885" width="360" height="64" class="box" fill="#ffffff" stroke="#90a4ae"/>
  <text x="710" y="923" class="label" text-anchor="middle">OpenAI or vLLM Endpoint</text>

  <rect x="930" y="885" width="360" height="64" class="box" fill="#ffffff" stroke="#90a4ae"/>
  <text x="1110" y="923" class="label" text-anchor="middle">Redis and PostgreSQL (optional)</text>

  <rect x="1330" y="885" width="360" height="64" class="box" fill="#ffffff" stroke="#90a4ae"/>
  <text x="1510" y="923" class="label" text-anchor="middle">Logs, Health, Readiness Ops</text>

  <!-- Arrows -->
  <line x1="340" y1="219" x2="590" y2="300" class="arrow"/>
  <line x1="720" y1="219" x2="590" y2="300" class="arrow"/>
  <line x1="1100" y1="219" x2="1200" y2="300" class="arrow"/>
  <line x1="1480" y1="219" x2="1200" y2="300" class="arrow"/>

  <line x1="590" y1="358" x2="300" y2="450" class="arrow"/>
  <line x1="1200" y1="358" x2="1605" y2="450" class="arrow"/>

  <line x1="300" y1="485" x2="500" y2="485" class="arrow"/>
  <line x1="640" y1="485" x2="840" y2="485" class="arrow"/>
  <line x1="980" y1="485" x2="1180" y2="485" class="arrow"/>
  <line x1="1320" y1="520" x2="300" y2="520" class="arrow"/>

  <line x1="1605" y1="520" x2="1510" y2="650" class="arrow"/>
  <line x1="300" y1="520" x2="310" y2="650" class="arrow"/>
  <line x1="640" y1="520" x2="710" y2="650" class="arrow"/>
  <line x1="980" y1="520" x2="1110" y2="650" class="arrow"/>

  <line x1="310" y1="787" x2="310" y2="885" class="arrow"/>
  <line x1="710" y1="787" x2="710" y2="885" class="arrow"/>
  <line x1="1110" y1="787" x2="1110" y2="885" class="arrow"/>
  <line x1="1510" y1="787" x2="1510" y2="885" class="arrow"/>
</svg>
