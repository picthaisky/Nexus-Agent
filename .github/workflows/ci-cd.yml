# ============================================================
# Nexus-Agent — CI/CD Pipeline
# ============================================================
# Workflow: Test → Build & Push → Deploy to Portainer
#
# Required GitHub Secrets:
#   PORTAINER_WEBHOOK_URL  — Portainer Stack webhook for auto-redeploy
#
# Required GitHub Variables (optional):
#   REGISTRY             — Container registry (default: ghcr.io)
#   IMAGE_NAME           — Image name (default: repo owner/name)
# ============================================================

name: CI/CD — Build & Deploy to Portainer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: "Target environment"
        required: false
        default: "production"
        type: choice
        options:
          - production
          - staging

# ── Permissions ──────────────────────────────────────────────
permissions:
  contents: read
  packages: write

# ── Environment Variables ────────────────────────────────────
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PYTHON_VERSION: "3.10"

# ============================================================
# Jobs
# ============================================================
jobs:
  # ────────────────────────────────────────────────────────────
  # Job 1: Lint & Test
  # ────────────────────────────────────────────────────────────
  test:
    name: 🧪 Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: 🔍 Lint with ruff (if available)
        continue-on-error: true
        run: |
          pip install ruff
          ruff check nexus_agent/ --output-format=github

      - name: 🧪 Run tests with pytest
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --junitxml=test-results.xml \
            --cov=nexus_agent \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

      - name: 📊 Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results.xml
            coverage.xml
          retention-days: 30

  # ────────────────────────────────────────────────────────────
  # Job 2: Build & Push Docker Image
  # ────────────────────────────────────────────────────────────
  build:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.build-push.outputs.digest }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value={{date 'YYYYMMDD-HHmmss'}}

      - name: 🏗️ Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: 📋 Image summary
        run: |
          echo "## 🐳 Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Registry** | \`${{ env.REGISTRY }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ env.IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Digest** | \`${{ steps.build-push.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tags** | ${{ steps.meta.outputs.tags }} |" >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────────────────────
  # Job 3: Deploy to Portainer
  # ────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Portainer
    runs-on: ubuntu-latest
    needs: build
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    environment:
      name: ${{ github.event.inputs.deploy_environment || 'production' }}
      url: ${{ vars.PORTAINER_URL || 'https://portainer.example.com' }}
    steps:
      - name: 🚀 Trigger Portainer Stack Webhook
        run: |
          echo "🚀 Triggering Portainer stack redeployment..."
          echo "   Image tag: ${{ needs.build.outputs.image_tag }}"
          echo "   Image digest: ${{ needs.build.outputs.image_digest }}"
          
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            "${{ secrets.PORTAINER_WEBHOOK_URL }}")
          
          echo "   Response status: ${HTTP_STATUS}"
          
          if [ "${HTTP_STATUS}" -ge 200 ] && [ "${HTTP_STATUS}" -lt 300 ]; then
            echo "✅ Portainer webhook triggered successfully!"
          else
            echo "❌ Portainer webhook failed with status: ${HTTP_STATUS}"
            exit 1
          fi

      - name: ⏳ Wait for deployment
        run: |
          echo "⏳ Waiting 30 seconds for Portainer to pull and start the new image..."
          sleep 30

      - name: ✅ Verify deployment health
        if: vars.DEPLOY_URL != ''
        continue-on-error: true
        run: |
          echo "🏥 Checking deployment health..."
          
          for i in {1..5}; do
            HTTP_STATUS=$(curl -s -o /tmp/health_response.json -w "%{http_code}" \
              "${{ vars.DEPLOY_URL }}/health" \
              --max-time 10)
            
            if [ "${HTTP_STATUS}" = "200" ]; then
              echo "✅ Deployment is healthy!"
              cat /tmp/health_response.json | python3 -m json.tool
              break
            fi
            
            echo "⏳ Attempt ${i}/5 — Status: ${HTTP_STATUS}, retrying in 10s..."
            sleep 10
          done

      - name: 📋 Deployment summary
        run: |
          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | \`${{ github.event.inputs.deploy_environment || 'production' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image Tag** | \`${{ needs.build.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | \`${{ github.actor }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Timestamp** | \`$(date -u '+%Y-%m-%d %H:%M:%S UTC')\` |" >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────────────────────
  # Job 4: Notify (on failure)
  # ────────────────────────────────────────────────────────────
  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: [test, build, deploy]
    if: failure()
    steps:
      - name: ❌ Pipeline failure summary
        run: |
          echo "## ❌ Pipeline Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Actor** | \`${{ github.actor }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Workflow** | [View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
