# Cyber-Thai Command Center · nginx reverse proxy + SPA host
# The container expects the backend to be reachable as `nexus-agent:8080`
# inside the docker network (see docker-compose.yml).

upstream nexus_backend {
    server nexus-agent:8080;
}

server {
    listen       80;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Security headers (defence-in-depth — backend also sets these) ──
    add_header X-Content-Type-Options    "nosniff"                          always;
    add_header X-Frame-Options           "DENY"                             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Hide server tokens
    server_tokens off;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API
    location /api/ {
        proxy_pass         http://nexus_backend/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Direct backend routes (snapshot, metrics, emit, inference, …)
    location ~ ^/(health|ready|info|inference|dashboard|kg|skills)(/|$) {
        proxy_pass         http://nexus_backend;
        proxy_set_header   Host $host;
        proxy_read_timeout 120s;
    }

    # WebSocket
    location /ws/ {
        proxy_pass         http://nexus_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 86400s;
    }
}
